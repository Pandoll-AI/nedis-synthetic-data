<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEDIS Synthetic Data Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fafafa;--fg:#111;--border:#ccc;--accent:#2563eb;--accent-hover:#1d4ed8;--muted:#666;--surface:#fff;--code-bg:#f5f5f5}
body{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;background:var(--bg);color:var(--fg);line-height:1.5;padding:2rem;max-width:960px;margin:0 auto}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:.25rem}
.subtitle{color:var(--muted);font-size:.75rem;margin-bottom:2rem}
.section{border:1px solid var(--border);padding:1.5rem;margin-bottom:1.5rem;background:var(--surface)}
.section-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:1rem}
.form-row{display:flex;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:.25rem}
.form-group label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.form-group input{border:1px solid var(--border);padding:.5rem .75rem;font-family:inherit;font-size:.85rem;width:160px;outline:none;transition:border-color .15s}
.form-group input:focus{border-color:var(--accent)}
.btn{border:1px solid var(--fg);background:var(--fg);color:var(--bg);padding:.6rem 1.5rem;font-family:inherit;font-size:.85rem;cursor:pointer;font-weight:600;letter-spacing:.02em;transition:all .15s}
.btn:hover{background:var(--accent);border-color:var(--accent)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--fg)}
.btn-outline:hover{background:var(--fg);color:var(--bg)}
.actions{display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.progress-wrap{flex:1;min-width:200px;display:none}
.progress-bar{height:6px;background:var(--code-bg);overflow:hidden}
.progress-fill{height:100%;width:0;background:var(--accent);transition:width .2s}
.progress-text{font-size:.7rem;color:var(--muted);margin-top:.25rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.5rem;margin-top:1rem;display:none}
.stat-item{font-size:.75rem}
.stat-label{color:var(--muted)}
.stat-value{font-weight:700}
.downloads{display:flex;gap:.75rem;margin-top:1rem;display:none}
.preview-wrap{max-height:400px;overflow:auto;margin-top:1rem;display:none}
.preview-wrap table{width:100%;border-collapse:collapse;font-size:.65rem}
.preview-wrap th,.preview-wrap td{border:1px solid var(--border);padding:.25rem .4rem;text-align:left;white-space:nowrap}
.preview-wrap th{background:var(--code-bg);position:sticky;top:0;font-weight:700}
.preview-wrap tr:nth-child(even){background:var(--code-bg)}
#errorMsg{color:#dc2626;font-size:.75rem;margin-top:.5rem;display:none}
</style>
</head>
<body>

<h1>NEDIS Synthetic Data Generator</h1>
<p class="subtitle">Browser-based synthetic emergency department data generator &mdash; no server required</p>

<div class="section">
  <div class="section-title">Settings</div>
  <div class="form-row">
    <div class="form-group">
      <label for="numRecords">Records</label>
      <input type="number" id="numRecords" value="10000" min="1" max="1000000">
    </div>
    <div class="form-group">
      <label for="targetYear">Year</label>
      <input type="number" id="targetYear" value="2018" min="2000" max="2030">
    </div>
    <div class="form-group">
      <label for="randomSeed">Seed</label>
      <input type="number" id="randomSeed" value="42" min="0">
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="btnGenerate" onclick="startGeneration()">Generate</button>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Preparing...</div>
    </div>
  </div>
  <div id="errorMsg"></div>
</div>

<div class="section" id="resultsSection" style="display:none">
  <div class="section-title">Results</div>
  <div class="stats" id="statsGrid"></div>
  <div class="downloads" id="downloadBtns">
    <button class="btn btn-outline" onclick="downloadCSV()">CSV Download</button>
    <button class="btn btn-outline" onclick="downloadJSON()">JSON Download</button>
  </div>
  <div class="preview-wrap" id="previewWrap">
    <table id="previewTable"></table>
  </div>
</div>

<script id="patternData" type="application/json">%%PATTERNS_JSON%%</script>

<script>
var PATTERNS = null;
var generatedData = null;
var activeWorkers = [];

try { PATTERNS = JSON.parse(document.getElementById('patternData').textContent); } catch(e) { console.error('Pattern parse error:', e); }

var COLUMNS = [
  'index_key','emorg_cd','pat_reg_no','vst_dt','vst_tm','pat_age_gr','pat_sex',
  'pat_do_cd','vst_meth','ktas_fstu','ktas01','msypt','main_trt_p','emtrt_rust',
  'otrm_dt','otrm_tm','ocur_dt','ocur_tm','vst_sbp','vst_dbp','vst_per_pu',
  'vst_per_br','vst_bdht','vst_oxy','inpat_dt','inpat_tm','inpat_rust'
];

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function startGeneration() {
  var numRecords = parseInt(document.getElementById('numRecords').value) || 10000;
  var targetYear = parseInt(document.getElementById('targetYear').value) || 2018;
  var seed = parseInt(document.getElementById('randomSeed').value) || 42;

  if (numRecords < 1 || numRecords > 1000000) { showError('Records: 1 ~ 1,000,000'); return; }

  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = 'Initializing workers...';
  document.getElementById('resultsSection').style.display = 'none';

  // Kill old workers
  activeWorkers.forEach(function(w) { w.terminate(); });
  activeWorkers = [];

  var numWorkers = Math.min(navigator.hardwareConcurrency || 4, 8, Math.ceil(numRecords / 500));
  var startTime = performance.now();

  // Split work
  var chunks = [];
  var base = Math.floor(numRecords / numWorkers);
  var remainder = numRecords % numWorkers;
  var offsetId = 0;
  for (var i = 0; i < numWorkers; i++) {
    var chunkSize = base + (i < remainder ? 1 : 0);
    chunks.push({ chunkSize: chunkSize, offsetId: offsetId, workerIdx: i, seed: seed + i * 1000000 });
    offsetId += chunkSize;
  }

  var results = new Array(numWorkers);
  var completed = 0;
  var workerProgress = new Array(numWorkers);
  for (var i = 0; i < numWorkers; i++) workerProgress[i] = 0;

  var workerCode = '(' + workerMain.toString() + ')()';
  var blob = new Blob([workerCode], { type: 'application/javascript' });
  var blobUrl = URL.createObjectURL(blob);

  for (var i = 0; i < numWorkers; i++) {
    (function(idx) {
      var w = new Worker(blobUrl);
      activeWorkers.push(w);
      w.onmessage = function(e) {
        var msg = e.data;
        if (msg.type === 'progress') {
          workerProgress[idx] = msg.pct;
          var totalPct = 0;
          for (var j = 0; j < numWorkers; j++) totalPct += workerProgress[j];
          totalPct = Math.round(totalPct / numWorkers);
          document.getElementById('progressFill').style.width = totalPct + '%';
          document.getElementById('progressText').textContent = msg.label + ' (' + totalPct + '%)';
        } else if (msg.type === 'done') {
          results[idx] = msg.data;
          completed++;
          if (completed === numWorkers) {
            // Merge results
            var merged = [];
            for (var j = 0; j < numWorkers; j++) {
              for (var k = 0; k < results[j].length; k++) merged.push(results[j][k]);
            }
            var elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
            generatedData = merged;
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('progressText').textContent = 'Done in ' + elapsed + 's (' + numWorkers + ' workers)';
            document.getElementById('btnGenerate').disabled = false;
            showResults(merged, elapsed, numWorkers);
            activeWorkers.forEach(function(wk) { wk.terminate(); });
            activeWorkers = [];
            URL.revokeObjectURL(blobUrl);
          }
        } else if (msg.type === 'error') {
          showError('Worker ' + idx + ': ' + msg.message);
          document.getElementById('btnGenerate').disabled = false;
        }
      };
      w.postMessage({
        patterns: PATTERNS, numRecords: chunks[idx].chunkSize,
        targetYear: targetYear, seed: chunks[idx].seed, offsetId: chunks[idx].offsetId
      });
    })(i);
  }
}

function showResults(data, elapsed, numWorkers) {
  document.getElementById('resultsSection').style.display = 'block';
  var statsGrid = document.getElementById('statsGrid');
  statsGrid.style.display = 'grid';
  var n = data.length;

  var ktasCounts = {};
  var sexCounts = { '1': 0, '2': 0 };
  for (var i = 0; i < n; i++) {
    var r = data[i];
    ktasCounts[r.ktas_fstu] = (ktasCounts[r.ktas_fstu] || 0) + 1;
    sexCounts[r.pat_sex] = (sexCounts[r.pat_sex] || 0) + 1;
  }
  var ktasStr = ['1','2','3','4','5'].map(function(k) {
    return k + '(' + ((ktasCounts[k]||0)/n*100).toFixed(1) + '%)';
  }).join(' ');

  statsGrid.textContent = '';
  var stats = [
    {l:'Total:', v: n.toLocaleString()},
    {l:'Time:', v: elapsed + 's / ' + numWorkers + ' workers'},
    {l:'Sex:', v: 'M ' + ((sexCounts['1']/n)*100).toFixed(1) + '% / F ' + ((sexCounts['2']/n)*100).toFixed(1) + '%'},
    {l:'KTAS:', v: ktasStr}
  ];
  stats.forEach(function(s) {
    var div = document.createElement('div'); div.className = 'stat-item';
    var lbl = document.createElement('span'); lbl.className = 'stat-label'; lbl.textContent = s.l;
    var val = document.createElement('span'); val.className = 'stat-value'; val.textContent = ' ' + s.v;
    div.appendChild(lbl); div.appendChild(val); statsGrid.appendChild(div);
  });

  document.getElementById('downloadBtns').style.display = 'flex';

  var wrap = document.getElementById('previewWrap');
  wrap.style.display = 'block';
  var table = document.getElementById('previewTable');
  table.textContent = '';
  var thead = document.createElement('thead');
  var headRow = document.createElement('tr');
  COLUMNS.forEach(function(c) { var th = document.createElement('th'); th.textContent = c; headRow.appendChild(th); });
  thead.appendChild(headRow); table.appendChild(thead);
  var tbody = document.createElement('tbody');
  var preview = data.slice(0, 20);
  preview.forEach(function(row) {
    var tr = document.createElement('tr');
    COLUMNS.forEach(function(c) { var td = document.createElement('td'); td.textContent = row[c] != null ? String(row[c]) : ''; tr.appendChild(td); });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}

function downloadCSV() {
  if (!generatedData) return;
  var parts = [COLUMNS.join(',') + '\n'];
  var batch = [];
  for (var i = 0; i < generatedData.length; i++) {
    var row = generatedData[i];
    var line = '';
    for (var j = 0; j < COLUMNS.length; j++) {
      if (j > 0) line += ',';
      var v = row[COLUMNS[j]];
      line += (v != null ? String(v) : '');
    }
    batch.push(line);
    if (batch.length >= 10000) { parts.push(batch.join('\n') + '\n'); batch = []; }
  }
  if (batch.length > 0) parts.push(batch.join('\n') + '\n');
  downloadFile(new Blob(parts, {type:'text/csv'}), 'nedis_synthetic.csv');
}

function downloadJSON() {
  if (!generatedData) return;
  downloadFile(new Blob([JSON.stringify(generatedData)], {type:'application/json'}), 'nedis_synthetic.json');
}

function downloadFile(blob, filename) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ============================================================
// WEB WORKER CODE — optimized with precompiled pattern caches
// ============================================================
function workerMain() {
  self.onmessage = function(e) {
    try {
      var msg = e.data;
      var gen = new NEDISGenerator(msg.patterns, msg.seed);
      var data = gen.generate(msg.numRecords, msg.targetYear, msg.offsetId || 0);
      self.postMessage({ type: 'done', data: data });
    } catch(err) {
      self.postMessage({ type: 'error', message: err.message || String(err) });
    }
  };

  function progress(pct, label) {
    self.postMessage({ type: 'progress', pct: Math.round(pct), label: label });
  }

  // ========================================
  // Seeded PRNG: xoshiro128**
  // ========================================
  function SeededRNG(seed) {
    var s = seed >>> 0;
    function sm() { s = (s + 0x9e3779b9) | 0; var t = s ^ (s >>> 16); t = Math.imul(t, 0x21f0aaad); t ^= t >>> 15; t = Math.imul(t, 0x735a2d97); t ^= t >>> 15; return t >>> 0; }
    this.s = [sm(), sm(), sm(), sm()];
  }
  SeededRNG.prototype._next = function() {
    var s = this.s;
    var result = (Math.imul(s[1] * 5, 1 << 7 | 1) >>> 0);
    var t = s[1] << 9;
    s[2] ^= s[0]; s[3] ^= s[1]; s[1] ^= s[2]; s[0] ^= s[3];
    s[2] ^= t;
    s[3] = (s[3] << 11 | s[3] >>> 21);
    return result;
  };
  SeededRNG.prototype.random = function() { return this._next() / 4294967296; };
  SeededRNG.prototype.randInt = function(min, max) { return min + Math.floor(this.random() * (max - min + 1)); };

  // ========================================
  // Pre-compiled distribution (items + cumulative Float64Array)
  // ========================================
  function compileDist(dict) {
    var keys = Object.keys(dict);
    var n = keys.length;
    var cum = new Float64Array(n);
    cum[0] = dict[keys[0]];
    for (var i = 1; i < n; i++) cum[i] = cum[i-1] + dict[keys[i]];
    // Normalize
    var total = cum[n-1];
    if (total > 0 && Math.abs(total - 1) > 0.001) {
      for (var i = 0; i < n; i++) cum[i] /= total;
    }
    return { items: keys, cum: cum, n: n };
  }

  function sampleCompiled(rng, cd) {
    var r = rng.random();
    // Binary search on cumulative array
    var lo = 0, hi = cd.n - 1;
    while (lo < hi) {
      var mid = (lo + hi) >> 1;
      if (cd.cum[mid] < r) lo = mid + 1; else hi = mid;
    }
    return cd.items[lo];
  }

  function batchSampleCompiled(rng, cd, n) {
    var result = new Array(n);
    var cum = cd.cum;
    var items = cd.items;
    var len = cd.n;
    for (var j = 0; j < n; j++) {
      var r = rng.random();
      var lo = 0, hi = len - 1;
      while (lo < hi) {
        var mid = (lo + hi) >> 1;
        if (cum[mid] < r) lo = mid + 1; else hi = mid;
      }
      result[j] = items[lo];
    }
    return result;
  }

  function normalSample(rng, mean, std) {
    var u1 = rng.random() || 1e-10;
    var u2 = rng.random();
    return mean + std * Math.sqrt(-2 * Math.log(u1)) * Math.cos(6.283185307179586 * u2);
  }

  function lognormSample(rng, shape, loc, scale) {
    if (!shape || !scale) return loc || 30;
    return loc + scale * Math.exp(shape * normalSample(rng, 0, 1));
  }

  function clamp(v, min, max) { return v < min ? min : (v > max ? max : v); }

  // ========================================
  // Pattern pre-compilation cache
  // ========================================
  function PatternCache(patterns) {
    this.P = patterns;
    this._cache = {};
  }
  PatternCache.prototype.get = function(category, key) {
    var cacheKey = category + '|' + key;
    if (this._cache[cacheKey]) return this._cache[cacheKey];
    var src = this.P[category];
    var dict = src ? src[key] : null;
    if (!dict || typeof dict !== 'object') return null;
    var cd = compileDist(dict);
    this._cache[cacheKey] = cd;
    return cd;
  };
  PatternCache.prototype.compileDirect = function(dict) {
    // For inline dicts not from patterns
    return compileDist(dict);
  };

  // ========================================
  // Hierarchical lookups
  // ========================================
  function hierarchicalKtasLookup(ktasP, region, hospitalType, cache) {
    var key = region + '_' + hospitalType;
    var majorKey = region.substring(0, 2) + '_' + hospitalType;
    var d;
    // Check detailed
    d = ktasP.detailed_patterns[key];
    if (d && Object.keys(d).length > 0) { var ck = 'ktas_d|' + key; if (!cache._cache[ck]) cache._cache[ck] = compileDist(d); return cache._cache[ck]; }
    // Major
    d = ktasP.major_patterns[majorKey];
    if (d && Object.keys(d).length > 0) { var ck = 'ktas_m|' + majorKey; if (!cache._cache[ck]) cache._cache[ck] = compileDist(d); return cache._cache[ck]; }
    // National
    if (ktasP.national_patterns && ktasP.national_patterns[hospitalType]) {
      d = ktasP.national_patterns[hospitalType];
      if (d && Object.keys(d).length > 0) { var ck = 'ktas_n|' + hospitalType; if (!cache._cache[ck]) cache._cache[ck] = compileDist(d); return cache._cache[ck]; }
    }
    // Overall
    var ck = 'ktas_o';
    if (!cache._cache[ck]) cache._cache[ck] = compileDist(ktasP.overall_pattern);
    return cache._cache[ck];
  }

  function hierarchicalTimeGapLookup(compTime, ktas, result, gapName) {
    if (!compTime) return null;
    var key1 = 'ktas_' + ktas + '_result_' + result;
    var key2 = 'ktas_' + ktas;
    var l1 = compTime.level_1;
    if (l1 && l1[key1] && l1[key1][gapName]) return l1[key1][gapName];
    var l2 = compTime.level_2;
    if (l2 && l2[key2] && l2[key2][gapName]) return l2[key2][gapName];
    var l3 = compTime.level_3;
    if (l3 && l3.overall && l3.overall[gapName]) return l3.overall[gapName];
    return null;
  }

  // ========================================
  // Date/time helpers
  // ========================================
  function formatDate(d) {
    var m = d.getMonth() + 1;
    var day = d.getDate();
    return String(d.getFullYear()) + (m < 10 ? '0' : '') + m + (day < 10 ? '0' : '') + day;
  }
  function formatTime(d) {
    var h = d.getHours();
    var m = d.getMinutes();
    return (h < 10 ? '0' : '') + h + (m < 10 ? '0' : '') + m;
  }

  // ========================================
  // NEDIS Generator (optimized)
  // ========================================
  function NEDISGenerator(patterns, seed) {
    this.P = patterns;
    this.rng = new SeededRNG(seed);
    this.cache = new PatternCache(patterns);

    // Pre-compile demographic dist
    this._demoDist = compileDist(patterns.demographic_patterns);

    // Pre-compile regional dist (by total_visits)
    var rp = patterns.regional_patterns;
    var rKeys = Object.keys(rp).filter(function(k) { return k !== ''; });
    var rDict = {};
    for (var i = 0; i < rKeys.length; i++) rDict[rKeys[i]] = rp[rKeys[i]].total_visits;
    this._regionDist = compileDist(rDict);

    // Pre-compile hourly/temporal distributions
    var tp = patterns.temporal_patterns;
    this._hourlyDist = tp.hourly_pattern ? compileDist(tp.hourly_pattern) : null;
    this._monthlyP = tp.monthly_pattern || {};
    this._weekdayP = tp.weekday_pattern || {};

    // Pre-compile conditional temporal distributions
    this._condTemporalCache = {};
    var ctp = patterns.temporal_conditional_patterns;
    if (ctp) {
      var types = ['month_dow_hour', 'month_hour', 'dow_hour'];
      for (var t = 0; t < types.length; t++) {
        var ttype = types[t];
        if (ctp[ttype]) {
          this._condTemporalCache[ttype] = {};
          var keys = Object.keys(ctp[ttype]);
          for (var k = 0; k < keys.length; k++) {
            this._condTemporalCache[ttype][keys[k]] = compileDist(ctp[ttype][keys[k]]);
          }
        }
      }
    }
  }

  NEDISGenerator.prototype.generate = function(n, year, offsetId) {
    // Use columnar storage for hot fields during generation, convert to records at the end
    var pat_age_gr = new Array(n);
    var pat_sex = new Array(n);
    var pat_do_cd = new Array(n);
    var emorg_cd = new Array(n);
    var vst_meth = new Array(n);
    var msypt = new Array(n);
    var main_trt_p = new Array(n);
    var ktas_fstu = new Array(n);
    var ktas01 = new Int8Array(n);
    var emtrt_rust = new Array(n);
    var vst_sbp = new Int16Array(n);
    var vst_dbp = new Int16Array(n);
    var vst_per_pu = new Int16Array(n);
    var vst_per_br = new Int16Array(n);
    var vst_bdht = new Float32Array(n); // *10, stored as int
    var vst_oxy = new Int16Array(n);
    var vst_dt = new Array(n);
    var vst_tm = new Array(n);
    var ocur_dt = new Array(n);
    var ocur_tm = new Array(n);
    var otrm_dt = new Array(n);
    var otrm_tm = new Array(n);
    var inpat_dt = new Array(n);
    var inpat_tm = new Array(n);
    var inpat_rust = new Array(n);

    // Step 1: Demographics (batch)
    progress(5, 'Demographics...');
    var demoSamples = batchSampleCompiled(this.rng, this._demoDist, n);
    var regionSamples = batchSampleCompiled(this.rng, this._regionDist, n);
    for (var i = 0; i < n; i++) {
      var parts = demoSamples[i];
      var sep = parts.indexOf('_');
      pat_age_gr[i] = parts.substring(0, sep);
      pat_sex[i] = parts.charAt(sep + 1) === 'M' ? '1' : '2';
      pat_do_cd[i] = regionSamples[i];
    }

    // Step 2: Hospital (cached compiled dists per region)
    progress(15, 'Hospitals...');
    var ha = this.P.hospital_allocation;
    var hospCache = {};
    for (var i = 0; i < n; i++) {
      var region = pat_do_cd[i];
      if (!hospCache[region]) {
        var hospProbs = ha.patterns[region];
        if (!hospProbs) {
          var major = region.substring(0, 2);
          hospProbs = ha.hierarchical_fallback[major] || ha.patterns[Object.keys(ha.patterns)[0]];
        }
        hospCache[region] = compileDist(hospProbs);
      }
      emorg_cd[i] = sampleCompiled(this.rng, hospCache[region]);
    }

    // Step 3: Clinical independent (cached)
    progress(25, 'Clinical attrs...');
    var vmCache = {}, ccCache = {}, deptCache = {};
    var vm = this.P.visit_method_patterns;
    var cc = this.P.chief_complaint_patterns;
    var dept = this.P.department_patterns;
    var vmKeys0 = Object.keys(vm)[0];
    var ccKeys0 = Object.keys(cc)[0];
    var deptKeys0 = Object.keys(dept)[0];

    for (var i = 0; i < n; i++) {
      var age = pat_age_gr[i];
      var sex = pat_sex[i] === '1' ? 'M' : 'F';
      var key = age + '_' + sex;

      if (!vmCache[age]) vmCache[age] = compileDist(vm[age] || vm[vmKeys0]);
      vst_meth[i] = sampleCompiled(this.rng, vmCache[age]);

      if (!ccCache[key]) ccCache[key] = compileDist(cc[key] || cc[ccKeys0]);
      msypt[i] = sampleCompiled(this.rng, ccCache[key]);

      if (!deptCache[key]) deptCache[key] = compileDist(dept[key] || dept[deptKeys0]);
      main_trt_p[i] = sampleCompiled(this.rng, deptCache[key]);
    }

    // Step 4: KTAS
    progress(35, 'KTAS...');
    var ktasP = this.P.ktas_distributions;
    var ktasCache = {};
    for (var i = 0; i < n; i++) {
      var region = pat_do_cd[i];
      if (!ktasCache[region]) {
        ktasCache[region] = hierarchicalKtasLookup(ktasP, region, 'medium', this.cache);
      }
      var kval = sampleCompiled(this.rng, ktasCache[region]);
      ktas_fstu[i] = kval;
      ktas01[i] = parseInt(kval) || 3;
    }

    // Step 4b: Treatment result
    progress(40, 'Treatment results...');
    var trp = this.P.treatment_result_patterns;
    var trKeys0 = Object.keys(trp)[0];
    var trCache = {};
    for (var i = 0; i < n; i++) {
      var trKey = ktas_fstu[i] + '_' + pat_age_gr[i];
      if (!trCache[trKey]) trCache[trKey] = compileDist(trp[trKey] || trp[trKeys0]);
      emtrt_rust[i] = sampleCompiled(this.rng, trCache[trKey]);
    }

    // Step 5: Vital signs
    progress(50, 'Vital signs...');
    this._genVitals(n, ktas_fstu, pat_age_gr, vst_sbp, vst_dbp, vst_per_pu, vst_per_br, vst_bdht, vst_oxy);

    // Step 6: Date/Time
    progress(65, 'Date/Time...');
    this._assignDateTime2(n, year, pat_age_gr, pat_sex, ktas_fstu, vst_dt, vst_tm);

    // Step 7: Time gaps
    progress(80, 'Time gaps...');
    this._genTimeGaps(n, ktas_fstu, emtrt_rust, vst_dt, vst_tm, ocur_dt, ocur_tm, otrm_dt, otrm_tm, inpat_dt, inpat_tm, inpat_rust);

    // Step 8: Build records
    progress(95, 'Building records...');
    var records = new Array(n);
    for (var i = 0; i < n; i++) {
      var bdht = vst_bdht[i];
      records[i] = {
        index_key: 'SYNTH_' + String(offsetId + i + 1).padStart(8, '0'),
        emorg_cd: emorg_cd[i],
        pat_reg_no: 'P' + String(this.rng.randInt(10000000, 99999999)),
        vst_dt: vst_dt[i], vst_tm: vst_tm[i],
        pat_age_gr: pat_age_gr[i], pat_sex: pat_sex[i], pat_do_cd: pat_do_cd[i],
        vst_meth: vst_meth[i], ktas_fstu: ktas_fstu[i], ktas01: ktas01[i],
        msypt: msypt[i], main_trt_p: main_trt_p[i], emtrt_rust: emtrt_rust[i],
        otrm_dt: otrm_dt[i], otrm_tm: otrm_tm[i],
        ocur_dt: ocur_dt[i], ocur_tm: ocur_tm[i],
        vst_sbp: vst_sbp[i], vst_dbp: vst_dbp[i],
        vst_per_pu: vst_per_pu[i], vst_per_br: vst_per_br[i],
        vst_bdht: bdht === 0 ? -1 : Math.round(bdht * 10) / 10,
        vst_oxy: vst_oxy[i],
        inpat_dt: inpat_dt[i] || '', inpat_tm: inpat_tm[i] || '', inpat_rust: inpat_rust[i] || ''
      };
    }
    progress(100, 'Complete');
    return records;
  };

  // ---- Vital signs (columnar) ----
  NEDISGenerator.prototype._genVitals = function(n, ktas, age, sbpArr, dbpArr, puArr, brArr, bdhtArr, oxyArr) {
    var measProb = { '1': 1.0, '2': 0.95, '3': 0.85, '4': 0.70, '5': 0.50 };
    var ageR = {
      '01':[75,12,50,8,130,20,35,8,36.8,0.3],'09':[95,10,60,8,90,15,22,4,36.7,0.3],
      '10':[110,12,70,8,80,12,18,3,36.6,0.3],'20':[120,12,75,8,75,10,16,2,36.5,0.3],
      '30':[122,12,78,8,74,10,16,2,36.5,0.3],'40':[126,14,80,9,74,10,16,2,36.5,0.3],
      '50':[130,16,82,10,73,10,16,2,36.4,0.3],'60':[135,18,80,10,72,10,17,3,36.3,0.3],
      '70':[138,20,78,10,72,12,17,3,36.2,0.4],'80':[140,22,76,10,73,12,18,3,36.1,0.4],
      '90':[138,24,74,12,75,14,18,4,36.0,0.5]
    };
    var defAR = ageR['40'];
    var rng = this.rng;

    for (var i = 0; i < n; i++) {
      var k = ktas[i];
      var mp = measProb[k] || 0.7;
      var ar = ageR[age[i]] || defAR;

      // SBP/DBP
      if (rng.random() < mp) {
        var sbp;
        var r1 = rng.random(), r2 = rng.random();
        if (r1 < 0.03) { sbp = clamp(Math.round(normalSample(rng, 75, 15)), 40, 90); }
        else if (r2 < 0.10) { sbp = clamp(Math.round(normalSample(rng, 180, 25)), 160, 250); }
        else { sbp = clamp(Math.round(normalSample(rng, ar[0], ar[1])), 60, 220); }
        sbpArr[i] = sbp;
        dbpArr[i] = clamp(Math.round(sbp * (0.60 + rng.random() * 0.15) + normalSample(rng, 0, 5)), 30, sbp - 20);
      } else { sbpArr[i] = -1; dbpArr[i] = -1; }

      // Pulse
      if (rng.random() < mp) {
        var r3 = rng.random(), r4 = rng.random();
        if (r3 < 0.06) puArr[i] = clamp(Math.round(normalSample(rng, 120, 20)), 100, 200);
        else if (r4 < 0.02) puArr[i] = clamp(Math.round(normalSample(rng, 45, 10)), 30, 60);
        else puArr[i] = clamp(Math.round(normalSample(rng, ar[4], ar[5])), 30, 200);
      } else { puArr[i] = -1; }

      // Respiration
      if (rng.random() < mp * 0.9) {
        if (rng.random() < 0.05) {
          var af = age[i] === '01' ? 1.3 : (age[i] === '09' ? 1.2 : 1.0);
          brArr[i] = clamp(Math.round(ar[6] * 1.8 * af), 22, 60);
        } else { brArr[i] = clamp(Math.round(normalSample(rng, ar[6], ar[7])), 8, 50); }
      } else { brArr[i] = -1; }

      // Temperature
      if (rng.random() < mp * 0.8) {
        var temp;
        if (rng.random() < 0.12) {
          var sv = rng.random();
          if (sv < 0.5) temp = normalSample(rng, 38.0, 0.3);
          else if (sv < 0.85) temp = normalSample(rng, 39.0, 0.4);
          else temp = normalSample(rng, 40.0, 0.5);
          temp = clamp(temp, 37.5, 42.0);
        } else if (rng.random() < 0.01) {
          temp = clamp(normalSample(rng, 34.5, 0.8), 32.0, 36.0);
        } else { temp = clamp(normalSample(rng, ar[8], ar[9]), 35.0, 37.5); }
        bdhtArr[i] = temp;
      } else { bdhtArr[i] = 0; } // 0 = not measured, converted to -1 in record build

      // SpO2
      if (rng.random() < mp * 0.7) {
        if (rng.random() < 0.04) {
          var sv2 = rng.random();
          if (sv2 < 0.5) oxyArr[i] = clamp(Math.round(normalSample(rng, 92, 2)), 50, 95);
          else if (sv2 < 0.85) oxyArr[i] = clamp(Math.round(normalSample(rng, 87, 3)), 50, 95);
          else oxyArr[i] = clamp(Math.round(normalSample(rng, 80, 5)), 50, 95);
        } else { oxyArr[i] = clamp(Math.round(normalSample(rng, 98, 1.5)), 90, 100); }
      } else { oxyArr[i] = -1; }
    }
  };

  // ---- Date/Time (optimized) ----
  NEDISGenerator.prototype._assignDateTime2 = function(n, year, ages, sexes, ktasFstu, dtArr, tmArr) {
    var isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
    var daysInYear = isLeap ? 366 : 365;

    // Pre-compute date strings and metadata
    var dateStrs = new Array(daysInYear);
    var dateMonths = new Int8Array(daysInYear);
    var dateDows = new Int8Array(daysInYear);
    var jsToPyDow = [6, 0, 1, 2, 3, 4, 5];

    for (var d = 0; d < daysInYear; d++) {
      var dt = new Date(year, 0, 1 + d);
      var m = dt.getMonth() + 1;
      var day = dt.getDate();
      dateStrs[d] = String(year) + (m < 10 ? '0' : '') + m + (day < 10 ? '0' : '') + day;
      dateMonths[d] = m;
      dateDows[d] = jsToPyDow[dt.getDay()];
    }

    // Compute daily volumes
    var mp = this._monthlyP;
    var wp = this._weekdayP;
    var mVals = Object.values(mp);
    var wVals = Object.values(wp);
    var mMean = mVals.length > 0 ? mVals.reduce(function(a,b){return a+b},0) / 12 : 1/12;
    var wMean = wVals.length > 0 ? wVals.reduce(function(a,b){return a+b},0) / 7 : 1/7;

    var weights = new Float64Array(daysInYear);
    var totalW = 0;
    for (var d = 0; d < daysInYear; d++) {
      var mMult = (mp[String(dateMonths[d])] || mMean) / mMean;
      var wMult = (wp[String(dateDows[d])] || wMean) / wMean;
      weights[d] = mMult * wMult;
      totalW += weights[d];
    }

    var dailyVols = new Int32Array(daysInYear);
    var assigned = 0;
    for (var d = 0; d < daysInYear; d++) {
      dailyVols[d] = Math.max(1, Math.round(n * weights[d] / totalW));
      assigned += dailyVols[d];
    }
    var rng = this.rng;
    while (assigned !== n) {
      var idx = rng.randInt(0, daysInYear - 1);
      if (assigned < n) { dailyVols[idx]++; assigned++; }
      else if (dailyVols[idx] > 1) { dailyVols[idx]--; assigned--; }
    }

    // Assign dates
    var ri = 0;
    var recMonth = new Int8Array(n);
    var recDow = new Int8Array(n);
    for (var d = 0; d < daysInYear && ri < n; d++) {
      var vol = dailyVols[d];
      var ds = dateStrs[d];
      var dm = dateMonths[d];
      var dd = dateDows[d];
      for (var j = 0; j < vol && ri < n; j++) {
        dtArr[ri] = ds;
        recMonth[ri] = dm;
        recDow[ri] = dd;
        ri++;
      }
    }

    // Assign hours using cached conditional temporal dists
    var ctc = this._condTemporalCache;
    var hourlyD = this._hourlyDist;

    for (var i = 0; i < n; i++) {
      var hd = null;
      if (ctc.month_dow_hour) {
        hd = ctc.month_dow_hour[recMonth[i] + '_' + recDow[i]];
      }
      if (!hd && ctc.month_hour) {
        hd = ctc.month_hour[String(recMonth[i])];
      }
      if (!hd && ctc.dow_hour) {
        hd = ctc.dow_hour[String(recDow[i])];
      }
      if (!hd) hd = hourlyD;

      var hour, minute;
      if (hd) {
        hour = sampleCompiled(rng, hd);
        minute = rng.randInt(0, 59);
      } else {
        hour = rng.randInt(0, 23);
        minute = rng.randInt(0, 59);
      }
      var h = parseInt(hour);
      tmArr[i] = (h < 10 ? '0' : '') + h + (minute < 10 ? '0' : '') + minute;
    }
  };

  // ---- Time gaps (optimized) ----
  NEDISGenerator.prototype._genTimeGaps = function(n, ktas, result, vstDt, vstTm, ocDt, ocTm, otDt, otTm, inDt, inTm, inRust) {
    var compTime = this.P.comprehensive_time_patterns;
    var tgp = this.P.time_gap_patterns;
    var rng = this.rng;

    // Pre-cache admission result distributions
    var admDists = {};
    var admProbs = {
      '1':{'1':0.3,'2':0.3,'3':0.1,'4':0.3},'2':{'1':0.4,'2':0.35,'3':0.15,'4':0.1},
      '3':{'1':0.5,'2':0.35,'3':0.1,'4':0.05},'4':{'1':0.55,'2':0.35,'3':0.08,'4':0.02},
      '5':{'1':0.6,'2':0.3,'3':0.08,'4':0.02}
    };
    for (var k in admProbs) admDists[k] = compileDist(admProbs[k]);

    // Gap param cache
    var gapParamCache = {};
    function getGapParams(kt, res, gapName) {
      var ck = kt + '|' + res + '|' + gapName;
      if (gapParamCache[ck] !== undefined) return gapParamCache[ck];
      var p = hierarchicalTimeGapLookup(compTime, kt, res, gapName);
      if (!p) {
        var flatKey = 'ktas_' + kt + '_result_' + res;
        if (tgp[flatKey] && tgp[flatKey][gapName]) p = tgp[flatKey][gapName];
      }
      gapParamCache[ck] = p;
      return p;
    }

    var erDefaults = {'1':240,'2':210,'3':180,'4':150,'5':120};
    var incDefaults = {'1':30,'2':45,'3':60,'4':90,'5':120};

    for (var i = 0; i < n; i++) {
      var kt = ktas[i];
      var res = result[i];
      var yr = parseInt(vstDt[i].substring(0, 4));
      var mo = parseInt(vstDt[i].substring(4, 6)) - 1;
      var dy = parseInt(vstDt[i].substring(6, 8));
      var hr = parseInt(vstTm[i].substring(0, 2));
      var mn = parseInt(vstTm[i].substring(2, 4));
      var baseMs = new Date(yr, mo, dy, hr, mn).getTime();

      // Incident gap
      var p1 = getGapParams(kt, res, 'incident_to_arrival');
      var incMin;
      if (p1 && p1.shape && p1.scale) incMin = lognormSample(rng, p1.shape, p1.loc||0, p1.scale);
      else incMin = Math.abs(normalSample(rng, incDefaults[kt]||60, 20));
      incMin = clamp(incMin, 1, 4320);
      var ocT = new Date(baseMs - incMin * 60000);
      ocDt[i] = formatDate(ocT);
      ocTm[i] = formatTime(ocT);

      // ER stay
      var p2 = getGapParams(kt, res, 'er_stay');
      var erMin;
      if (p2 && p2.shape && p2.scale) erMin = lognormSample(rng, p2.shape, p2.loc||0, p2.scale);
      else erMin = Math.abs(normalSample(rng, erDefaults[kt]||180, 60));
      erMin = clamp(erMin, 10, 10080);
      var otT = new Date(baseMs + erMin * 60000);
      otDt[i] = formatDate(otT);
      otTm[i] = formatTime(otT);

      // Admission
      if (res === '31' || res === '32' || res === '33' || res === '34') {
        var p3 = getGapParams(kt, res, 'discharge_to_admission');
        var admMin;
        if (p3 && p3.shape && p3.scale) admMin = lognormSample(rng, p3.shape, p3.loc||0, p3.scale);
        else admMin = Math.abs(normalSample(rng, 60, 30));
        admMin = clamp(admMin, 1, 2880);
        var inT = new Date(otT.getTime() + admMin * 60000);
        inDt[i] = formatDate(inT);
        inTm[i] = formatTime(inT);
        inRust[i] = sampleCompiled(rng, admDists[kt] || admDists['3']);
      }
    }
  };
}
</script>
